version: "3.8"

services:
  balancer:
    build: .
    container_name: server_balancer
    ports:
      - "8000:8000"          # FastAPI / uvicorn
    volumes:
      - ./config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  default:
    name: server_balancer_net
    driver: bridge
